name = "bloom-portal"
main = "worker.ts"
compatibility_date = "2024-01-01"
assets = { directory = "./public", not_found_handling = "single-page-application" }

[[kv_namespaces]]
binding = "BLOOM_KV"
id = "9336bc6ddcca42bf8718546380c869d0"
preview_id = "9336bc6ddcca42bf8718546380c869d0"

[[r2_buckets]]
binding = "BLOOM_R2"
bucket_name = "dashboard"

[vars]
ENVIRONMENT = "production"

# Secrets to configure in Cloudflare dashboard:
# ADMIN_USERNAME, ADMIN_PASSWORD, RESEND_API_KEY, RESEND_FROM_EMAIL, PORTAL_BASE_URL
