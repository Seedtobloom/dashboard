name = "bloom-portal"
pages_build_output_dir = "public"
compatibility_date = "2024-01-01"

[[kv_namespaces]]
binding = "BLOOM_KV"
id = "YOUR_KV_NAMESPACE_ID"
preview_id = "YOUR_KV_PREVIEW_NAMESPACE_ID"

[[r2_buckets]]
binding = "BLOOM_R2"
bucket_name = "bloom-portal-files"

# Secrets configured in Cloudflare Pages dashboard:
# ADMIN_USERNAME, ADMIN_PASSWORD, RESEND_API_KEY, RESEND_FROM_EMAIL, PORTAL_BASE_URL
