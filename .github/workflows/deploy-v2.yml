name: Deploy v2 (client + admin)

# Déploie les 4 workers v2 (client + admin) sur Cloudflare à chaque push.
# Les backs sont déployés AVANT les fronts (cibles des service bindings).
# N'interfère pas avec le déploiement V1 (deploy.yml).
#
# Prérequis (une seule fois) :
#  - Secrets repo : CLOUDFLARE_API_TOKEN, CLOUDFLARE_ACCOUNT_ID
#  - Renseigner les id KV dans client-v2/wrangler.client-back.toml
#    et admin-v2/wrangler.admin-back.toml (KV_CLIENT, KV_ADMIN).
#  - Les namespaces KV, le bucket R2 (stb-files) et les secrets de chaque
#    worker (INTERNAL_SECRET, RESEND_*, admin:auth) doivent déjà exister.

on:
  push:
    branches:
      - main
    paths:
      - 'client-v2/**'
      - 'admin-v2/**'
      - '.github/workflows/deploy-v2.yml'
  workflow_dispatch: {}

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install deps
        run: npm ci

      - name: Build fronts (SPA -> front.js)
        run: |
          node client-v2/build-front.js
          node admin-v2/build-front.js

      # Déploiement avec nouvelles tentatives automatiques : Cloudflare renvoie
      # parfois une erreur réseau passagère (« fetch failed ») qui faisait
      # échouer tout le déploiement. On réessaie chaque worker jusqu'à 5 fois
      # avec un délai croissant, pour que le déploiement passe à chaque fois.
      - name: Deploy tous les workers (avec retry)
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          set -u
          deploy_with_retry() {
            local dir="$1" cfg="$2" name="$3"
            local n=1 max=5
            while true; do
              echo "::group::Déploiement $name (tentative $n/$max)"
              if (cd "$dir" && npx wrangler deploy --config "$cfg"); then
                echo "✅ $name déployé"
                echo "::endgroup::"
                return 0
              fi
              echo "::endgroup::"
              if [ "$n" -ge "$max" ]; then
                echo "❌ Échec du déploiement de $name après $max tentatives"
                return 1
              fi
              local wait=$((n * 15))
              echo "⚠️  $name : échec (tentative $n), nouvelle tentative dans ${wait}s…"
              sleep "$wait"
              n=$((n + 1))
            done
          }
          # Backs d'abord (cibles des service bindings), puis fronts.
          deploy_with_retry client-v2 wrangler.client-back.toml  stb-client-back
          deploy_with_retry admin-v2  wrangler.admin-back.toml   stb-admin-back
          deploy_with_retry client-v2 wrangler.client-front.toml stb-client-front
          deploy_with_retry admin-v2  wrangler.admin-front.toml  stb-admin-front
