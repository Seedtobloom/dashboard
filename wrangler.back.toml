name = "bloom-portal-back"
main = "wBack.ts"
compatibility_date = "2024-01-01"

[[kv_namespaces]]
binding = "BLOOM_KV"
id = "9336bc6ddcca42bf8718546380c869d0"
preview_id = "9336bc6ddcca42bf8718546380c869d0"

[[r2_buckets]]
binding = "BLOOM_R2"
bucket_name = "dashboard"

[vars]
ENVIRONMENT = "production"
PORTAL_BASE_URL = "https://bloom-portal.seedtobloom.workers.dev"

# Secrets to configure in Cloudflare dashboard:
# RESEND_API_KEY, RESEND_FROM_EMAIL
# ADMIN_USERNAME, ADMIN_PASSWORD (not used by back, but required by Env type)
